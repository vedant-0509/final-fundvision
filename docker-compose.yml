version: "3.9"

# ── FundVision Pro — Docker Compose ──────────────────────────────────────────
# Usage: docker-compose up --build
# Spins up: MySQL 8 + FastAPI backend + (optional) Nginx

services:

  # ── MySQL Database ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: fundvision_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: fundvision
      MYSQL_USER: ${DB_USER:-fundvision_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-fundvision_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fundvision_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: fundvision
      DB_USER: ${DB_USER:-fundvision_user}
      DB_PASSWORD: ${DB_PASSWORD:-fundvision_pass}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend:ro
      - ./frontend:/app/frontend:ro
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 2

  # ── Nginx Reverse Proxy (production) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fundvision_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    profiles:
      - production   # Only starts with: docker-compose --profile production up

volumes:
  mysql_data:
    driver: local

networks:
  default:
    name: fundvision_network
